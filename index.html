<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Victor Laureano Vega</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/png" href="Recursos/Favicon.png">
    </head>
    <body>
        <header>
            <a href="index.html">
              <h1>Victor Laureano Vega</h1>
            </a>
        </header>



        <section id="destacado" class="seccion">
          <div class="contenedor">
            <h3>Cortometraje de <b>Péndulo a media oscuridad</b></h3>
            <div class="video">
              <iframe 
                  src="https://www.youtube.com/embed/z6mUjEQjh_g" 
                  allowfullscreen>
              </iframe>
          </div>
        </section>



        <section id="archivo" class="seccion">
          <div class="contenedor">
            <div class="proyecto">
              <a href="archivo.html">
                Archivo
              </a>
            </div>
          </div>
        </section>



        <section id="contacto" class="seccion">
          <p>Formulario de contacto:</p>
        
          <div class="formulario">
            <form id="form" method="POST">
              <div class="input">
                <div>
                  <input type="text" name="nombre" placeholder="Nombre" required>
                </div>
                <div>
                  <input type="email" name="correo" placeholder="Correo electrónico" required>
                </div>
              </div>
          
              <textarea id="mensaje" name="mensaje" rows="5" placeholder="Mensaje" required></textarea>
          
              <button type="submit">Enviar</button>

              <input type="hidden" name="_next" value="https://victorlaureanovega.github.io/Archivo/">
            </form>
          </div>
        </section>
        


        <script>
          document.addEventListener("DOMContentLoaded", function () {
            const formulario = document.getElementById("form");
            const cE = "dmljdG9ybGF1cmVhbm92ZWdhQGdtYWlsLmNvbQ==";
            const dE = atob(cE);
            formulario.action = `https://formsubmit.co/${dE}`;
          });
        </script>
    </body>
</html>
